# wan-split configuration for GL.iNet/OpenWrt
#
# ENABLED=0 means hotplug/init events will not install policy routes.
# Use `wan-split on` and `wan-split off` to change this safely.
ENABLED=0

# OpenWrt logical WAN interface names to consider, in stable table order.
# The GL-X2000 currently uses tethering for USB tether and modem_2_1 for the
# internal cellular modem.
INTERFACES="tethering modem_2_1 wan secondwan wwan"

# Policy-routing priority and first routing table number owned by this tool.
# Keep priority after Tailscale's table-52 rule and before main/default.
PRIO=25300
TABLE_BASE=20010

# Client assignment behavior.
# "balanced" sorts clients deterministically and spreads counts evenly.
# "hash" uses rendezvous hashing for stable, roughly even distribution.
# "throughput" places heavier clients onto the least-utilized healthy WAN,
# weighted by WAN_CAPACITY_MBPS below.
ASSIGNMENT_MODE=balanced

# Throughput mode capacity hints, in Mbps, keyed by OpenWrt logical interface.
# These do not need to be perfect; they are used as relative weights.
# Example for a cellular router with USB tether + internal modem + Ethernet WAN:
# WAN_CAPACITY_MBPS="tethering:80 modem_2_1:60 wan:100"
WAN_CAPACITY_MBPS=""
WAN_CAPACITY_DEFAULT_MBPS=60

# Per-client accounting. This uses a small iptables mangle chain that counts
# LAN client source IP bytes. Disable if your firmware/hardware offload makes
# counters unreliable or if you only want static modes.
ACCOUNTING=1
ACCOUNTING_CHAIN=WAN_SPLIT_ACCT
CLIENT_RATE_ALPHA=70
MIN_SAMPLE_SECONDS=2

# Require active WANs to pass a tiny health check before assigning clients.
HEALTH_CHECK=1
HEALTH_TARGETS="1.1.1.1 8.8.8.8"
HEALTH_COUNT=1
HEALTH_TIMEOUT=2

# Re-apply routes on interface hotplug events when ENABLED=1.
HOTPLUG_REBALANCE=1

# Optional space-separated client IPs to leave on GL.iNet's normal routing.
EXCLUDE_IPS=""

# DHCP lease source. Only current leases in the LAN /24 are assigned.
LEASE_FILE=/tmp/dhcp.leases

# Runtime state lives in /tmp and is intentionally cleared by reboot.
STATE_DIR=/tmp/wan-split
LOG_FILE=/tmp/wan-split.log
